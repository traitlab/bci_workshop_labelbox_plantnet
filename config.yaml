labelbox:
  # Dataset names to export (all datasets matching this prefix)
  dataset_prefix: 2024_bci
  # Demo dataset for Stage 1 testing (read-only, safe)
  demo_dataset_name: Brazilian Amazon Trees - Demo
  # Projects from which to import labels (all others, e.g. demo projects, are excluded)
  label_projects:
    - 2024_BCI
    - 2024_BCI_Off-island
    - 2024_BCI_northeast_old
    - 2024_BCI_plots_old
    - 2024_BCI_plots
  # Project A (all label types)
  project_a_name: BCI Workshop - All Label Types v2
  project_a_ontology_name: BCI Workshop - All Label Types v2
  # Source ontology ID for Project B taxon list
  project_b_source_ontology_id: cm9fy6wm00xis073obwoa5228
  # Project B (botanist labelling)
  project_b_name: BCI Workshop - Botanist Labelling
  project_b_ontology_name: BCI Workshop - Botanist Labelling
  # Name of the new combined dataset to create (Phase 0e)
  combined_dataset_name: BCI Workshop - Drone Photos

plantnet:
  embeddings_api_url: https://my-api.plantnet.org/v2/embeddings
  identify_url: https://my-api.plantnet.org/v2/identify/k-central-america
  identify_nb_results: 5
  identify_organs: auto
  identify_lang: en
  single_model_name: Pl@ntNet Single - Central America
  single_model_run_name: v7.4-2026-03-27

folders:
  output: output
  exports: output/00_exports
  crosswalk: output/01_crosswalk
  species_list: output/02_species_list
  dataset: output/03_dataset
  project_a: output/04_project_a
  export_for_plantnet: output/05_export_for_plantnet
  project_b: output/06_project_b
  predictions: output/07_predictions
  single_predictions: output/13_single_predictions
  embeddings: output/08_embeddings
